<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    # SSE / long-poll: отключаем буферизацию на уровне Apache
    SetEnv no-gzip 1
    Header set X-Accel-Buffering "no"

    # Таймаут для долгих запросов (Airtable + LLM стриминг)
    TimeOut 300
    ProxyTimeout 300

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
