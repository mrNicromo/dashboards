name: Deploy to Beget

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-beget
  cancel-in-progress: false

jobs:
  deploy:
    name: Rsync to Beget over SSH
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.BEGET_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host beget
            HostName ${{ secrets.BEGET_HOST }}
            User     ${{ secrets.BEGET_USER }}
            Port     22
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 30
          EOF
          chmod 600 ~/.ssh/config

      - name: Rsync dashboard/ -> public_html
        run: |
          rsync -avz --delete \
            --exclude 'cache/' \
            --exclude 'snapshots/' \
            --exclude 'data/' \
            --exclude 'config.php' \
            --exclude 'cron_warmup.log' \
            dashboard/ beget:${{ secrets.BEGET_PATH }}/

      - name: Прогрев кэша + healthcheck
        run: |
          ssh beget "cd ${{ secrets.BEGET_PATH }} && /usr/local/bin/php8.3 cron_warmup.php --only=fact >> /tmp/cron_warmup_$(date +%F).log 2>&1 || true"
          if [ -n "${{ secrets.BEGET_HEALTHZ_URL }}" ]; then
            curl -fsS --max-time 10 "${{ secrets.BEGET_HEALTHZ_URL }}" || echo "WARN: healthz не отвечает"
          fi

      - name: Готово
        run: echo "Deploy на Beget завершён"
